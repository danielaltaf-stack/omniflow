# ═══════════════════════════════════════════════════════════════════
# OmniFlow — Render Blueprint (100% Free Tier)
# ═══════════════════════════════════════════════════════════════════
# Render auto-detects this file and provisions infrastructure.
# Free plan: 750h/month, 512MB RAM, auto-sleep after 15min idle.
#
# Deploy: Render Dashboard → New → Blueprint → Connect GitHub repo
# ═══════════════════════════════════════════════════════════════════

services:
  # ── Backend API (FastAPI + Woob + Gunicorn) ──────────────────
  - type: web
    name: omniflow-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    rootDir: apps/api
    region: frankfurt
    plan: free
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/api/**
    envVars:
      # ── Core ──
      - key: APP_NAME
        value: "OmniFlow API"
      - key: APP_VERSION
        value: "0.5.0"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: WARNING
      - key: LAUNCH_MODE
        value: beta

      # ── Database (Neon — set in dashboard) ──
      - key: DATABASE_URL
        sync: false
      - key: DB_POOL_SIZE
        value: "5"
      - key: DB_MAX_OVERFLOW
        value: "10"
      - key: DB_POOL_RECYCLE
        value: "300"

      # ── Redis (Upstash — set in dashboard) ──
      - key: REDIS_URL
        sync: false
      - key: REDIS_MAX_CONNECTIONS
        value: "10"

      # ── Security (auto-generated by Render) ──
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: BCRYPT_ROUNDS
        value: "13"

      # ── CORS (update with your Vercel URL) ──
      - key: ALLOWED_ORIGINS
        value: '["https://omniflow-web.vercel.app"]'

      # ── Sentry (set in dashboard) ──
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.2"
      - key: SENTRY_PROFILES_SAMPLE_RATE
        value: "0.1"
      - key: SENTRY_ENVIRONMENT
        value: production

      # ── AI (set in dashboard) ──
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: AI_DAILY_LIMIT
        value: "20"

      # ── Performance ──
      - key: WEB_CONCURRENCY
        value: "2"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
