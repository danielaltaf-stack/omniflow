<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniFlow — Hors-ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      color: #e5e5e5;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 420px;
    }
    .logo {
      font-size: 1.75rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
    }
    .wifi-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      opacity: 0.5;
      animation: pulse 2s ease-in-out infinite;
    }
    .wifi-icon svg {
      width: 100%;
      height: 100%;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f5f5f5;
    }
    p {
      font-size: 0.875rem;
      line-height: 1.6;
      color: #a3a3a3;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .retry-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }
    .retry-btn:active {
      transform: translateY(0);
    }
    .status {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #737373;
    }
    .status.checking {
      color: #eab308;
    }
    .status.online {
      color: #22c55e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">OmniFlow</div>

    <div class="wifi-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" y1="2" x2="22" y2="22" />
        <path d="M8.5 16.5a5 5 0 0 1 7 0" />
        <path d="M2 8.82a15 15 0 0 1 4.17-2.65" />
        <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76" />
        <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68" />
        <path d="M5 12.86a10 10 0 0 1 5.17-2.86" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>

    <h1>Vous êtes hors-ligne</h1>
    <p>
      Vos données sont en cache et seront disponibles dès que vous aurez
      retrouvé une connexion internet. OmniFlow synchronisera automatiquement
      les dernières mises à jour.
    </p>

    <button class="retry-btn" onclick="tryReconnect()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10" />
        <polyline points="1 20 1 14 7 14" />
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
      </svg>
      Réessayer
    </button>

    <p class="status" id="status">Vérification automatique toutes les 5 secondes...</p>
  </div>

  <script>
    const statusEl = document.getElementById('status');

    async function tryReconnect() {
      statusEl.textContent = 'Vérification en cours...';
      statusEl.className = 'status checking';

      try {
        const resp = await fetch('/api/v1/../health', { cache: 'no-store' });
        if (resp.ok) {
          statusEl.textContent = 'Connexion rétablie ! Redirection...';
          statusEl.className = 'status online';
          setTimeout(() => window.location.replace('/dashboard'), 500);
          return;
        }
      } catch {}

      // Also check if the main page loads
      try {
        const resp = await fetch('/', { cache: 'no-store' });
        if (resp.ok) {
          statusEl.textContent = 'Connexion rétablie ! Redirection...';
          statusEl.className = 'status online';
          setTimeout(() => window.location.replace('/dashboard'), 500);
          return;
        }
      } catch {}

      statusEl.textContent = 'Toujours hors-ligne. Nouvelle tentative dans 5s...';
      statusEl.className = 'status';
    }

    // Auto-check every 5 seconds
    setInterval(tryReconnect, 5000);
  </script>
</body>
</html>
